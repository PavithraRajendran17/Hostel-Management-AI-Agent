# Spring Boot Application Properties
spring.application.name=hostel-management-ai-agent

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:hostel_management
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# Gemini API Configuration
gemini.api.key=AQ.Ab8RN6JEvQ8WoamR7yIFCSqfs0A5L5kGkkQxEbRDSllkVGUVNw
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# JWT Configuration
jwt.secret=your-secret-key-for-jwt-token-generation
jwt.expiration=86400000
